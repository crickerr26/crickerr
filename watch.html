<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Live Match Broadcast</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;800;900&family=Roboto:wght@400;500;700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #viewer-video { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            background: #000; 
            display: block; 
            transform: translateZ(0); 
            backface-visibility: hidden;
        }

        @media (orientation: landscape) {
            #viewer-video {
                object-fit: contain;
            }
        }
        
        /* LIVE BADGE */
        #live-badge {
            position: absolute; top: 25px; right: 25px;
            background: #ef4444; border: 1px solid #ef4444;
            padding: 8px 20px; border-radius: 50px; color: white;
            font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px;
            display: none; align-items: center; gap: 10px; z-index: 800;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
        }
        .live-dot {
            width: 10px; height: 10px; background: white; border-radius: 50%;
            animation: blinkRed 1s infinite;
        }
        @keyframes blinkRed {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* QUALITY INDICATOR & MENU */
        #quality-badge {
            position: absolute; top: 25px; left: 25px;
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 15px; border-radius: 8px; color: white;
            font-family: 'Roboto Condensed', sans-serif; font-size: 14px; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; z-index: 800; backdrop-filter: blur(4px);
            transition: background 0.3s;
        }
        #quality-badge:hover { background: rgba(0,0,0,0.8); }

        #quality-menu {
            display: none; position: absolute; top: 70px; left: 25px;
            background: rgba(15, 23, 42, 0.95); border: 1px solid #333;
            border-radius: 8px; z-index: 801; flex-direction: column;
            backdrop-filter: blur(10px); min-width: 160px; overflow: hidden;
        }
        .q-option {
            padding: 12px 20px; color: #ccc; cursor: pointer;
            font-family: 'Roboto', sans-serif; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .q-option:last-child { border-bottom: none; }
        .q-option:hover { background: rgba(255,255,255,0.1); color: white; }

        /* SHARE BUTTON */
        #share-btn {
            position: absolute; bottom: 30px; right: 25px;
            background: #3b82f6; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 18px; border-radius: 50px; color: white;
            font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; z-index: 800; display: none; align-items: center; gap: 6px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5); transition: transform 0.1s;
        }
        #share-btn:active { transform: scale(0.95); }
        #share-btn svg { width: 16px; height: 16px; fill: white; }

        @media (orientation: portrait) {
            #share-btn.match-active { display: flex; }
        }

        /* --- BROADCAST WATERMARK LOGO --- */
        #broadcast-watermark {
            position: absolute; left: 15px; width: 60px; height: auto; opacity: 0;    
            z-index: 45; pointer-events: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6)); transition: opacity 0.8s ease-in-out;
        }
        /* Portrait: Perfectly calculates video bound inside black bars */
        @media (orientation: portrait) { #broadcast-watermark { bottom: calc(50vh - 28vw + 80px); } }
        /* Landscape: Video touches the bottom */
        @media (orientation: landscape) { #broadcast-watermark { bottom: 80px; } }
        .show-watermark { opacity: 0.95 !important; }

        /* LIVE STATS & CHAT */
        #live-stats-bar {
            position: absolute; top: 25px; right: 120px;
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 50px;
            color: white; font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: bold;
            display: none; align-items: center; gap: 8px; z-index: 800; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
        }
        #chat-container {
            position: absolute; bottom: 85px; left: 15px; width: 280px; max-height: 200px;
            display: none; flex-direction: column; justify-content: flex-end; z-index: 800; pointer-events: none;
        }
        @media (orientation: landscape) { #chat-container { width: 350px; } }
        #chat-messages {
            overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-bottom: 10px; pointer-events: auto;
            max-height: 150px; scrollbar-width: none;
            mask-image: linear-gradient(to bottom, transparent, black 15%); -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%);
        }
        #chat-messages::-webkit-scrollbar { display: none; }
        .chat-msg { background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 12px; width: max-content; max-width: 100%; word-wrap: break-word; color: white; font-family: 'Roboto', sans-serif; font-size: 13px; text-shadow: 1px 1px 2px #000; display: inline-block; line-height: 1.3;}
        .chat-user { font-weight: bold; color: #fbbf24; margin-right: 5px; }
        #chat-input-area { display: flex; gap: 8px; pointer-events: auto; align-items: center; }
        #chat-input { flex-grow: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.6); color: white; font-size: 13px; outline: none; backdrop-filter: blur(5px); }
        #chat-send { background: #3b82f6; border: none; border-radius: 50%; width: 36px; height: 36px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        #heart-container {
            position: absolute; bottom: 85px; right: 15px; z-index: 800; display: none; flex-direction: column; align-items: center; justify-content: flex-end; pointer-events: none; height: 250px; width: 60px;
        }
        #heart-btn {
            width: 46px; height: 46px; background: rgba(239, 68, 68, 0.2); border-radius: 50%; border: 2px solid #ef4444; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; transition: transform 0.1s; margin-top: auto; backdrop-filter: blur(5px);
        }
        #heart-btn:active { transform: scale(0.9); }
        #heart-btn svg { width: 22px; height: 22px; fill: #ef4444; }
        .floating-heart {
            position: absolute; bottom: 50px; width: 24px; height: 24px; pointer-events: none;
            animation: floatUp 2s ease-in forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5) rotate(calc(var(--rot) * 1deg)); opacity: 0; }
        }

        /* Live Overlay Sponsors */
        #live-sponsors-container {
            position: absolute;
            top: 80px;
            right: 25px;
            display: flex;
            flex-direction: row;
            gap: 10px;
            z-index: 45;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .live-sponsor { height: 75px; width: auto; min-width: 120px; max-width: 220px; }

        /* OVERLAYS */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; color: white; z-index: 10;
        }

        /* INPUT SCREEN & LIVE MATCHES LIST */
        #input-overlay { 
            z-index: 30; display: none; 
            background: #0a0a0a; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            padding-top: 60px;
            overflow-y: auto;
        }
        .search-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 500px; margin-bottom: 40px;
        }
        .search-container h2 { margin-bottom: 15px; font-size: 22px; color: #fff; letter-spacing: 1px;}
        .search-box {
            display: flex; gap: 10px; width: 90%; justify-content: center;
        }
        #match-input {
            padding: 12px 20px; font-size: 18px; border-radius: 8px; 
            border: 2px solid #333; background: #111; color: white; 
            text-transform: uppercase; text-align: center;
            flex-grow: 1; outline: none; transition: 0.2s;
        }
        #match-input:focus { border-color: #3b82f6; }
        #submit-btn {
            padding: 12px 25px; background: #3b82f6; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transition: transform 0.1s;
        }
        #submit-btn:active { transform: scale(0.95); }

        .live-matches-container {
            width: 90%; max-width: 800px;
            padding-bottom: 50px;
        }
        .live-matches-container h2 {
            font-size: 20px; color: #fff; letter-spacing: 1px; margin-bottom: 20px; text-align: center;
        }
        .country-group {
            margin-bottom: 30px;
        }
        .country-header {
            font-family: 'Roboto Condensed', sans-serif; font-size: 18px; font-weight: bold; color: #cbd5e1;
            margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 5px; text-transform: uppercase;
        }
        .match-cards {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;
        }
        .match-card {
            background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px;
            cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .match-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
        .match-card-live {
            position: absolute; top: 10px; right: 10px;
            background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444;
            padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold;
            display: flex; align-items: center; gap: 5px; letter-spacing: 1px;
        }
        .match-card-title {
            font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 800; color: white;
            margin-top: 10px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .match-card-sub {
            font-size: 12px; color: #888; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* STATUS SCREEN */
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-text { font-size: 16px; font-weight: bold; letter-spacing: 1px; color: #cbd5e1; text-align: center; padding: 0 20px; line-height: 1.5; }
        
        /* PLAY FALLBACK SCREEN */
        #play-overlay {
            background: rgba(0, 0, 0, 0.8); z-index: 20; display: none; cursor: pointer;
        }
        #play-btn {
            padding: 15px 40px; background: #22c55e; color: white; border: none;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        /* --- NEW IMPACT EVENT ANIMATION STYLES --- */
        #event-stage-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 900;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 70%);
            opacity: 0; transition: opacity 0.2s ease-out;
        }
        #event-stage-overlay.is-active { opacity: 1; }

        .shockwave {
            position: absolute; width: 10px; height: 10px;
            border: 20px solid rgba(255,255,255,0.8); border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0; pointer-events: none;
        }
        .is-active .shockwave { animation: shockwaveAnim 1.2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        @keyframes shockwaveAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; border-width: 50px; }
            100% { transform: translate(-50%, -50%) scale(150); opacity: 0; border-width: 0px; }
        }

        #event-text-box {
            position: relative; z-index: 905;
            display: none; transform: scale(0);
        }
        .is-active #event-text-box { 
            display: block; 
            animation: textImpactAnim 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        #event-text-box span {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Anton', sans-serif;
            font-size: 28vw;
            letter-spacing: 5px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .text-glow {
            -webkit-text-stroke: 8px rgba(255, 255, 255, 0.5);
            filter: blur(20px); z-index: 1;
        }
        .text-core {
            color: #ffffff;
            background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 40%, #94a3b8 100%);
            -webkit-background-clip: text; color: transparent;
            z-index: 2;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.9));
            -webkit-text-stroke: 3px rgba(0, 0, 0, 0.9);
        }
        
        @keyframes textImpactAnim {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; filter: brightness(4); }
            8% { transform: scale(1.2) rotate(5deg); opacity: 1; filter: brightness(2); }
            15% { transform: scale(1) rotate(0deg); filter: brightness(1); }
            85% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) translateY(100px); opacity: 0; filter: brightness(0); }
        }

        /* --- CINEMATIC MATCH INTRO BANNER --- */
        #match-intro-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 850;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.6s ease;
        }
        .intro-banner-container {
            position: relative; overflow: hidden;
            width: 85%; max-width: 1400px;
            background: linear-gradient(135deg, rgba(5, 10, 25, 0.98) 0%, rgba(15, 30, 65, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 35px 70px rgba(0,0,0,0.9), 0 0 60px rgba(56, 189, 248, 0.2);
            border-radius: 24px;
            padding: 60px 80px;
            display: flex; flex-direction: column; align-items: center;
            transform: translateY(50px) scale(0.9);
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(25px);
        }
        .intro-banner-container::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: introShimmer 3.5s infinite 1s; pointer-events: none;
        }
        @keyframes introShimmer { 0% { left: -150%; } 100% { left: 250%; } }
        .intro-active { opacity: 1 !important; }
        .intro-active .intro-banner-container { transform: translateY(0) scale(1); }
        .intro-out { opacity: 0 !important; }
        .intro-out .intro-banner-container { transform: translateY(40px) scale(0.95); } 
        
        .intro-header-badge {
            background: rgba(220, 38, 38, 0.9); border: 1px solid #ef4444; color: white;
            font-family: 'Roboto', sans-serif; font-weight: 700; letter-spacing: 3px;
            padding: 8px 30px; border-radius: 50px; font-size: 16px; margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); text-transform: uppercase;
            animation: badgePulse 2s infinite;
        }
        @keyframes badgePulse { 0% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); } 50% { box-shadow: 0 0 25px rgba(239, 68, 68, 0.7); } 100% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); } }
        
        .intro-teams { display: flex; align-items: center; justify-content: center; gap: 60px; width: 100%; }
        .intro-team { display: flex; flex-direction: column; align-items: center; gap: 25px; flex: 1; min-width: 0; }
        .intro-team img { 
            width: 170px; height: 170px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.9); 
            box-shadow: 0 0 30px rgba(255,255,255,0.2), inset 0 0 20px rgba(0,0,0,0.5); 
            background: rgba(0,0,0,0.4); object-fit: contain; padding: 10px; 
            animation: logoFloat 4s ease-in-out infinite;
        }
        @keyframes logoFloat { 0% { transform: translateY(0px); box-shadow: 0 0 20px rgba(255,255,255,0.2); } 50% { transform: translateY(-12px); box-shadow: 0 15px 35px rgba(255,255,255,0.4); } 100% { transform: translateY(0px); box-shadow: 0 0 20px rgba(255,255,255,0.2); } }
        
        .intro-team-name { 
            font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 34px; color: white; text-shadow: 0 6px 15px rgba(0,0,0,0.9); 
            text-transform: uppercase; white-space: normal; width: 100%; line-height: 1.2; letter-spacing: 1px; text-align: center;
        }
        .intro-vs { 
            font-family: 'Montserrat', sans-serif; font-size: 38px; font-style: italic; font-weight: 900; 
            color: #fbbf24; text-shadow: 0 4px 15px rgba(251, 191, 36, 0.5); padding: 0 25px; 
            animation: vsPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s backwards;
        }
        @keyframes vsPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .intro-divider { width: 85%; height: 2px; background: linear-gradient(90deg, transparent, rgba(251,191,36,0.8), transparent); margin: 40px 0 30px 0; }
        .intro-info { font-family: 'Roboto', sans-serif; font-size: 22px; font-weight: 500; color: #cbd5e1; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 3px 6px rgba(0,0,0,0.8); }

        /* SPONSORS */
        .sponsor-logo-box { background: transparent !important; border: none !important; box-shadow: none !important; padding: 0; display: flex; align-items: center; justify-content: center; overflow: visible; }
        .sponsor-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.8)); }
        #intro-sponsors-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .intro-sponsors-row { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .intro-sponsor-main { height: 75px; min-width: 140px; }
        .intro-sponsor-sub { height: 55px; min-width: 100px; }
        #event-sponsors-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; z-index: 910; opacity: 0; transition: opacity 0.5s ease; }
        .event-sponsor-main { height: 85px; min-width: 150px; }
        .event-sponsor-sub { height: 60px; min-width: 110px; }
    </style>
</head>
<body>

    <audio id="audio-four" src="four.mp3" preload="auto"></audio>
    <audio id="audio-six" src="six.mp3" preload="auto"></audio>
    <audio id="audio-wicket" src="wicket.mp3" preload="auto"></audio>
    <audio id="audio-transition" src="transitionmusic.mp3" preload="auto"></audio>

    
    
    <div id="event-stage-overlay">
        <div class="shockwave"></div>
        <div id="event-text-box">
            <span class="text-glow">SIX</span>
            <span class="text-core">SIX</span>
        </div>
        <div id="event-sponsors-container"></div>
    </div>
<div id="live-badge"><div class="live-dot"></div>LIVE</div>
    <div id="live-stats-bar">
        <svg style="width:16px;height:16px;fill:white;" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        <span id="viewer-count-text">0</span>
    </div>
    
    <div id="quality-badge" onclick="toggleQualityMenu()">1080p (HIGH)</div>
    <div id="quality-menu">
        <div class="q-option" onclick="selectQuality(40000, '1080p (HIGH)')">High Quality</div>
        <div class="q-option" onclick="selectQuality(2500, '720p (MED)')">Medium Quality</div>
        <div class="q-option" onclick="selectQuality(800, '480p (LOW)')">Low Quality (Data Saver)</div>
    </div>

    <div id="share-btn" onclick="shareMatch()">
        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
        SHARE
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">

    <video id="viewer-video" autoplay playsinline></video>
        <div class="intro-banner-container">

            <div class="intro-teams">

                <div class="intro-vs">VS</div>
                <div class="intro-team">
                    <img id="intro-t2-logo" src="">
                    <span class="intro-team-name" id="intro-t2-name">TEAM 2</span>
                </div>
            </div>
            <div class="intro-divider"></div>

    <div id="input-overlay" class="overlay">
        <div class="search-container">

        <button id="play-btn">TAP TO WATCH LIVE</button>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = { 
            apiKey: "AIzaSyBqcD59IAPpKqk98oDZkgzgkoVZ8b8LGgY", 
            authDomain: "livecricketscoring-92087.firebaseapp.com", 
            databaseURL: "https://livecricketscoring-92087-default-rtdb.firebaseio.com", 
            projectId: "livecricketscoring-92087", 
            storageBucket: "livecricketscoring-92087.firebasestorage.app", 
            messagingSenderId: "522927197627", 
            appId: "1:522927197627:web:f1df5db736cae96893089e" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const video = document.getElementById('viewer-video');
        const inputOverlay = document.getElementById('input-overlay');
        const matchInput = document.getElementById('match-input');
        const statusOverlay = document.getElementById('status-overlay');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('spinner');
        const playOverlay = document.getElementById('play-overlay');
        
        let peer = null;
        let activeCall = null;
        let activePeerId = null;
        let currentBandwidth = 40000; // Force Highest Quality by Default
        let isSwitchingQuality = false;
        
        let unsubscribe = null;
        let lastActionId = null;
        let introPlayed = false;
        let currentMatchData = {};

        let activeMatchId = null;
        let chatUnsubscribe = null;
        let heartUnsubscribe = null;
        let isViewerAdded = false;
        let lastHeartCount = 0;
        const currentUserId = "User" + Math.floor(Math.random() * 9000 + 1000);

        function toggleQualityMenu() {
            const menu = document.getElementById('quality-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function shareMatch() {
            const matchId = document.getElementById('match-input').value.trim() || new URLSearchParams(window.location.search).get('matchId');
            if (!matchId) return;

            const shareUrl = window.location.origin + window.location.pathname + '?matchId=' + matchId.toUpperCase();
            const shareData = {
                title: 'Live Cricket Match',
                text: 'Watch this cricket match live right now!',
                url: shareUrl
            };

            if (navigator.share) {
                navigator.share(shareData).catch((err) => console.log('Error sharing:', err));
            } else {
                // Fallback: Copy to clipboard
                const tempInput = document.createElement('input');
                document.body.appendChild(tempInput);
                tempInput.value = shareUrl;
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                alert('Match link copied to clipboard!');
            }
        }

        function selectQuality(bw, label) {
            document.getElementById('quality-menu').style.display = 'none';
            document.getElementById('quality-badge').innerText = label;
            
            if (currentBandwidth === bw) return;
            currentBandwidth = bw;
            
            // Seamlessly drop and re-fetch the stream with the new quality boundary
            if (activePeerId && peer && !peer.destroyed) {
                if (activeCall) {
                    isSwitchingQuality = true;
                    activeCall.close();
                }
                connectToStream(activePeerId, true);
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const matchId = params.get('matchId');

            if (!matchId) {
                inputOverlay.style.display = 'flex';
                statusOverlay.style.display = 'none';
                fetchLiveMatches();
            } else {
                inputOverlay.style.display = 'none';
                checkLiveStatus(matchId.toUpperCase());
            }
        };

        function fetchLiveMatches() {
            const listContainer = document.getElementById('live-matches-list');
            
            // Sign in anonymously first to satisfy Firebase security rules
            firebase.auth().signInAnonymously().then(() => {
                db.collection("live_matches")
                  .where("isStreaming", "==", true)
                  .onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        listContainer.innerHTML = '<div style="text-align: center; color: #888; font-size: 16px;">No live broadcasts at the moment.</div>';
                        return;
                    }

                    const matchesByCountry = {};
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const country = data.country || "International"; // Grouping fallback
                        if (!matchesByCountry[country]) {
                            matchesByCountry[country] = [];
                        }
                        matchesByCountry[country].push({ id: doc.id, ...data });
                    });

                    let html = '';
                    for (const [country, matches] of Object.entries(matchesByCountry)) {
                        html += `
                        <div class="country-group">
                            <div class="country-header">${country}</div>
                            <div class="match-cards">
                                ${matches.map(m => `
                                    <div class="match-card" onclick="selectMatchFromList('${m.id}')">
                                        <div class="match-card-live"><div class="live-dot" style="width:6px;height:6px;"></div> LIVE</div>
                                        <div class="match-card-title">${m.t1 || 'Team 1'} vs ${m.t2 || 'Team 2'}</div>
                                        <div class="match-card-sub">${m.matchType || 'Match'} • ${m.venue || 'Venue'}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                    }
                    listContainer.innerHTML = html;
                }, (error) => {
                    console.error("Error fetching live matches:", error);
                    listContainer.innerHTML = '<div style="text-align: center; color: #ef4444;">Error loading matches.</div>';
                });
            }).catch((error) => {
                console.error("Auth error:", error);
                listContainer.innerHTML = '<div style="text-align: center; color: #ef4444;">Authentication failed. Cannot load matches.</div>';
            });
        }

        function selectMatchFromList(matchId) {
            matchInput.value = matchId;
            submitMatchId();
        }

        function submitMatchId() {
            const val = matchInput.value.trim().toUpperCase();
            if (!val) {
                alert("Please enter a valid Match ID");
                return;
            }
            
            window.history.replaceState(null, '', '?matchId=' + val);
            
            inputOverlay.style.display = 'none';
            statusOverlay.style.display = 'flex';
            spinner.style.display = 'block';
            
            checkLiveStatus(val);
        }

        function checkLiveStatus(matchId) {
            statusText.innerText = "Authenticating with Database...";
            
            if (unsubscribe) unsubscribe();

            // Authenticate silently first to satisfy Firebase security rules
            firebase.auth().signInAnonymously().then(() => {
                statusText.innerText = "Looking for Match ID in Database...";
                
                unsubscribe = db.collection("live_matches").doc(matchId).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        currentMatchData = data;

                        // --- ANIMATION / INTRO SYNC LOGIC ---
                        if (data.t1 && data.t2 && data.t1 !== "HOME" && !introPlayed) {
                            introPlayed = true;
                            setTimeout(() => triggerMatchIntro(data), 1500);
                        }
                        
                        if (data.lastAction && data.lastAction.id !== lastActionId) {
                            const isInitialLoad = (lastActionId === null);
                            lastActionId = data.lastAction.id;
                            
                            // Ensure it only triggers if it's a genuinely NEW action (not initial load)
                            if (!isInitialLoad && ['4', '6', 'W'].includes(data.lastAction.type)) {
                                triggerAudio(data.lastAction.type);
                                triggerAnim(data.lastAction.type, data.sponsors);
                            }
                        }

                        // --- WATERMARK & SPONSOR VISIBILITY ---
                        const introOverlay = document.getElementById('match-intro-overlay');
                        const isIntroActive = introOverlay && (introOverlay.classList.contains('intro-active') || introOverlay.style.display === 'flex');
                        
                        let hasOverlay = false;
                        if (data.showSquad || data.showBattingCard || data.showBowlingCard || data.showRunRate || data.matchStatus === "COMPLETE" || data.showDismissalCard) {
                            hasOverlay = true;
                        }

                        const wm = document.getElementById('broadcast-watermark');
                        const ls = document.getElementById('live-sponsors-container');
                        
                        if (isIntroActive || hasOverlay) {
                            if (wm) wm.classList.remove('show-watermark');
                            if (ls) ls.style.opacity = '0';
                        } else {
                            if (wm) wm.classList.add('show-watermark');
                            
                            // Update Live Sponsors dynamically
                            if (data.sponsors && (data.sponsors.main || data.sponsors.sponsor2)) {
                                let html = '';
                                if (data.sponsors.main) html += createSponsorHTML(data.sponsors.main, 'live-sponsor');
                                if (data.sponsors.sponsor2) html += createSponsorHTML(data.sponsors.sponsor2, 'live-sponsor');
                                if (ls) {
                                    ls.innerHTML = html;
                                    ls.style.opacity = '1';
                                }
                            } else {
                                if (ls) ls.style.opacity = '0';
                            }
                        }

                        // --- LIVE FEATURES & STREAM LOGIC ---
                        activeMatchId = matchId;
                        
                        if (data.viewers !== undefined) {
                            document.getElementById('viewer-count-text').innerText = data.viewers;
                        }

                        if (data.isStreaming && data.streamId) {
                            if (!peer) {
                                connectToStream(data.streamId);
                            }
                            document.getElementById('live-badge').style.display = 'flex';
                            document.getElementById('live-stats-bar').style.display = 'flex';
                            document.getElementById('chat-container').style.display = 'flex';
                            document.getElementById('heart-container').style.display = 'flex';
                            document.getElementById('share-btn').classList.add('match-active');
                            
                            initLiveFeatures(matchId);
                        } else {
                            showError("The broadcaster is currently offline.");
                            if (peer) { peer.destroy(); peer = null; }
                            video.srcObject = null;
                            document.getElementById('live-badge').style.display = 'none';
                            document.getElementById('live-stats-bar').style.display = 'none';
                            document.getElementById('chat-container').style.display = 'none';
                            document.getElementById('heart-container').style.display = 'none';
                            document.getElementById('share-btn').classList.remove('match-active');
                        }
                    } else {
                        showError("Match not found.\nMake sure the Broadcaster has clicked 'GO LIVE'.");
                        document.getElementById('live-badge').style.display = 'none';
                        document.getElementById('live-stats-bar').style.display = 'none';
                    }
                }, (error) => {
                    console.error("Firestore error:", error);
                    if (error.code === 'permission-denied') {
                        showError("Database Permission Denied!\nPlease update your Firebase Firestore Rules to allow reading.");
                    } else {
                        showError("Connection error to Database.");
                    }
                });
            }).catch((error) => {
                console.error("Auth error:", error);
                // Fallback to fetch directly if Anonymous Auth isn't enabled in Firebase settings
                showError("Database Permission Denied!\nPlease update your Firebase Firestore Rules to allow reading.");
            });
        }

        function connectToStream(targetPeerId, isReconnecting = false) {
            activePeerId = targetPeerId;
            
            if (!isReconnecting) {
                statusText.innerText = "Connecting to Broadcast Server...";
                spinner.style.display = 'block';
                
                peer = new Peer({
                    config: {
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    }
                });

                peer.on('open', () => {
                    initiateCall(targetPeerId);
                });

                peer.on('error', (err) => {
                    console.error("Peer error:", err);
                    showError("Failed to connect to video server.\nPlease refresh and try again.");
                });
            } else {
                statusOverlay.style.display = 'flex';
                statusText.innerText = "Adjusting Video Quality...";
                spinner.style.display = 'block';
                initiateCall(targetPeerId);
            }
        }

        function initiateCall(targetPeerId) {
            statusText.innerText = "Fetching Live Video Feed...";
            
            let dummyStream;
            try {
                const dummyCanvas = document.createElement('canvas');
                dummyCanvas.width = 1920; 
                dummyCanvas.height = 1080;
                const dummyCtx = dummyCanvas.getContext('2d');
                dummyCtx.fillStyle = '#000';
                dummyCtx.fillRect(0, 0, 1920, 1080);
                dummyStream = dummyCanvas.captureStream(1); 
            } catch(e) {
                dummyStream = new MediaStream();
            }

            // Apply selected bandwidth and FORCE high starting bitrate to avoid slow start blur
            activeCall = peer.call(targetPeerId, dummyStream, {
                sdpTransform: (sdp) => {
                    let newSdp = sdp;
                    if (newSdp.includes('a=mid:video')) {
                        newSdp = newSdp.replace(/a=mid:video\r\n/g, `a=mid:video\r\nb=AS:${currentBandwidth}\r\n`);
                    }
                    // This specific line guarantees it skips "auto-detecting network speed" and jumps straight to crisp quality
                    newSdp = newSdp.replace(/(a=fmtp:\d+ .*)\r\n/g, `$1;x-google-start-bitrate=${currentBandwidth};x-google-min-bitrate=${Math.floor(currentBandwidth/2)}\r\n`);
                    return newSdp;
                }
            }); 
            
            activeCall.on('stream', (remoteStream) => {
                isSwitchingQuality = false;
                statusOverlay.style.display = 'none';
                video.srcObject = remoteStream;
                
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        playOverlay.style.display = 'flex';
                    });
                }
            });
            
            activeCall.on('close', () => {
                if (!isSwitchingQuality) {
                    showError("Stream disconnected by broadcaster.");
                }
            });
            
            activeCall.on('error', (err) => {
                console.error("Call error:", err);
                showError("Stream connection error.");
            });
        }

        function startVideo() {
            playOverlay.style.display = 'none';
            video.muted = false; 
            video.play();
        }

        function showError(msg) {
            statusOverlay.style.display = 'flex';
            spinner.style.display = 'none';
            statusText.innerText = msg;
            
            if (!document.getElementById('back-btn')) {
                const backBtn = document.createElement('button');
                backBtn.id = 'back-btn';
                backBtn.innerText = 'TRY ANOTHER ID';
                backBtn.style.cssText = "margin-top: 25px; padding: 12px 25px; background: transparent; border: 2px solid #555; color: white; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;";
                backBtn.onmouseover = () => backBtn.style.borderColor = "#3b82f6";
                backBtn.onmouseout = () => backBtn.style.borderColor = "#555";
                
                backBtn.onclick = () => {
                    window.history.replaceState(null, '', window.location.pathname);
                    statusOverlay.style.display = 'none';
                    inputOverlay.style.display = 'flex';
                    if (peer) { peer.destroy(); peer = null; }
                };
                statusOverlay.appendChild(backBtn);
            }
        }
        
        matchInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                submitMatchId();
            }
        });

        document.getElementById("chat-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendChatMessage();
            }
        });

        // --- LIVE ENGAGEMENT FUNCTIONS ---
        function initLiveFeatures(matchId) {
            // Track Viewer Presence (Join & Leave)
            if (!isViewerAdded) {
                isViewerAdded = true;
                db.collection("live_matches").doc(matchId).update({
                    viewers: firebase.firestore.FieldValue.increment(1)
                }).catch(e => console.log("Viewer increment error", e));

                window.addEventListener("beforeunload", () => {
                    db.collection("live_matches").doc(matchId).update({
                        viewers: firebase.firestore.FieldValue.increment(-1)
                    });
                });
            }

            // Sync Realtime Chat
            if (!chatUnsubscribe) {
                chatUnsubscribe = db.collection("live_matches").doc(matchId).collection("chat")
                    .orderBy("timestamp", "desc").limit(30)
                    .onSnapshot((snapshot) => {
                        const chatBox = document.getElementById('chat-messages');
                        let html = '';
                        const msgs = [];
                        snapshot.forEach(doc => msgs.push(doc.data()));
                        // Render oldest to newest
                        msgs.reverse().forEach(msg => {
                            html += `<div class="chat-msg"><span class="chat-user">${msg.user}:</span>${msg.text}</div>`;
                        });
                        chatBox.innerHTML = html;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    });
            }

            // Sync Floating Hearts for Everyone
            if (!heartUnsubscribe) {
                heartUnsubscribe = db.collection("live_matches").doc(matchId).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const currentHearts = data.hearts || 0;
                        if (currentHearts > lastHeartCount) {
                            let diff = currentHearts - lastHeartCount;
                            if (diff > 15) diff = 15; // Prevent screen spam limit
                            for(let i=0; i<diff; i++) {
                                setTimeout(spawnFloatingHeart, i * 150);
                            }
                            lastHeartCount = currentHearts;
                        } else {
                            lastHeartCount = currentHearts; 
                        }
                    }
                });
            }
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !activeMatchId) return;
            
            input.value = '';
            db.collection("live_matches").doc(activeMatchId).collection("chat").add({
                user: currentUserId,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function sendHeart() {
            if (!activeMatchId) return;
            spawnFloatingHeart(); // Immediate visual feedback for the user who clicked
            db.collection("live_matches").doc(activeMatchId).update({
                hearts: firebase.firestore.FieldValue.increment(1)
            }).catch(() => {
                // If it's the very first heart on the match, set it up
                db.collection("live_matches").doc(activeMatchId).set({ hearts: 1 }, { merge: true });
            });
        }

        function spawnFloatingHeart() {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '<svg viewBox="0 0 24 24" fill="#ef4444"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
            
            const rot = Math.floor(Math.random() * 60) - 30; // Random angle
            heart.style.setProperty('--rot', rot);
            heart.style.left = (Math.random() * 20 + 10) + 'px';
            
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 2000);
        }

        // --- ANIMATION HELPER FUNCTIONS ---
        function createSponsorHTML(src, className) {
            if (!src) return '';
            return `<div class="sponsor-logo-box ${className}"><img src="${src}"></div>`;
        }

        function formatIntroTeamName(name) { 
            if (!name) return "TEAM"; 
            let formatted = String(name); 
            formatted = formatted.replace(/\bCRICKET CLUB\b/gi, "C.C").replace(/\bCRICKET\b/gi, "C.C").replace(/\bCC\b/gi, "C.C"); 
            return formatted; 
        }

        function playTransitionSound() {
            try { 
                const audioTransition = document.getElementById('audio-transition');
                audioTransition.currentTime = 0; 
                audioTransition.volume = 1.0; 
                audioTransition.play().catch(e => {}); 
            } catch(e) {}
        }

        function triggerMatchIntro(match) {
            const overlay = document.getElementById('match-intro-overlay');
            if (!overlay) return;

            document.getElementById('intro-t1-name').innerText = formatIntroTeamName(match.t1);
            document.getElementById('intro-t2-name').innerText = formatIntroTeamName(match.t2);
            
            const l1 = document.getElementById('intro-t1-logo');
            if (match.t1Logo) { l1.src = match.t1Logo; l1.style.display = 'block'; } else { l1.style.display = 'none'; }
            
            const l2 = document.getElementById('intro-t2-logo');
            if (match.t2Logo) { l2.src = match.t2Logo; l2.style.display = 'block'; } else { l2.style.display = 'none'; }

            const matchType = match.matchType ? match.matchType : "Friendly Match";
            const venue = match.venue ? match.venue : "Toronto";
            let dateStr = "Today";
            
            if (match.matchDate) {
                const d = new Date(match.matchDate);
                dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            } else {
                const d = new Date();
                dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            }
            document.getElementById('intro-match-info').innerText = `${matchType} – ${venue} – ${dateStr}`;

            const introSponsors = document.getElementById('intro-sponsors-container');
            if (introSponsors) {
                const sponsors = match.sponsors || {};
                let topRow = ''; let bottomRow = '';
                if (sponsors.main) topRow += createSponsorHTML(sponsors.main, 'intro-sponsor-main');
                if (sponsors.sponsor2) topRow += createSponsorHTML(sponsors.sponsor2, 'intro-sponsor-sub');
                if (sponsors.sponsor3) bottomRow += createSponsorHTML(sponsors.sponsor3, 'intro-sponsor-sub');
                if (sponsors.sponsor4) bottomRow += createSponsorHTML(sponsors.sponsor4, 'intro-sponsor-sub');
                introSponsors.innerHTML = `
                    ${topRow ? `<div class="intro-sponsors-row">${topRow}</div>` : ''}
                    ${bottomRow ? `<div class="intro-sponsors-row">${bottomRow}</div>` : ''}
                `;
            }

            const wm = document.getElementById('broadcast-watermark');
            const ls = document.getElementById('live-sponsors-container');
            if (wm) wm.classList.remove('show-watermark');
            if (ls) ls.style.opacity = '0';

            // Play swoosh/stinger sound to match broadcaster output exactly
            playTransitionSound();

            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('intro-active'), 50);

            setTimeout(() => {
                overlay.classList.remove('intro-active');
                overlay.classList.add('intro-out');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.classList.remove('intro-out');
                    // Bring back watermark if no other overlays are active
                    if (currentMatchData && !currentMatchData.showSquad && !currentMatchData.showBattingCard && !currentMatchData.showBowlingCard && !currentMatchData.showRunRate && currentMatchData.matchStatus !== "COMPLETE" && !currentMatchData.showDismissalCard) {
                        if (wm) wm.classList.add('show-watermark');
                        if (ls && currentMatchData.sponsors && (currentMatchData.sponsors.main || currentMatchData.sponsors.sponsor2)) ls.style.opacity = '1';
                    }
                }, 800);
            }, 5000);
        }

        function triggerAudio(type) {
            const audioId = type === '4' ? 'audio-four' : type === '6' ? 'audio-six' : type === 'W' ? 'audio-wicket' : null;
            if(['4','6','W'].includes(type)) {
                playTransitionSound();
            }
            if (audioId) { 
                const audio = document.getElementById(audioId); 
                audio.currentTime = 0; 
                audio.play().catch(e => {}); 
            }
        }

        function triggerAnim(type, sponsorsObj) {
            let displayText = "";
            let accentColor = "";
            
            // Assign Dynamic Colors based on the event
            if (type === '4') { displayText = "FOUR"; accentColor = "rgba(56, 189, 248, 0.8)"; } // Bright Blue
            else if (type === '6') { displayText = "SIX"; accentColor = "rgba(34, 197, 94, 0.8)"; } // Bright Green
            else if (type === 'W') { displayText = "OUT"; accentColor = "rgba(239, 68, 68, 0.8)"; } // Bright Red
            else return;

            const stage = document.getElementById('event-stage-overlay');
            const box = document.getElementById('event-text-box');
            const spans = box.querySelectorAll('span');
            const shockwave = document.querySelector('.shockwave');

            const sponsors = sponsorsObj || {};
            const eventSponsors = document.getElementById('event-sponsors-container');
            if (eventSponsors) {
                let html = '';
                if (type === '6') {
                    if (sponsors.main) html += createSponsorHTML(sponsors.main, 'event-sponsor-main');
                } else if (type === '4') {
                    if (sponsors.main) html += createSponsorHTML(sponsors.main, 'event-sponsor-main');
                    if (sponsors.sponsor2) html += createSponsorHTML(sponsors.sponsor2, 'event-sponsor-sub');
                } else if (type === 'W') {
                    if (sponsors.main) html += createSponsorHTML(sponsors.main, 'event-sponsor-main');
                    if (sponsors.sponsor2) html += createSponsorHTML(sponsors.sponsor2, 'event-sponsor-sub');
                    if (sponsors.sponsor3) html += createSponsorHTML(sponsors.sponsor3, 'event-sponsor-sub');
                    if (sponsors.sponsor4) html += createSponsorHTML(sponsors.sponsor4, 'event-sponsor-sub');
                }
                eventSponsors.innerHTML = html;
            }

            // Remove class immediately to reset the state
            stage.classList.remove('is-active');
            
            // Apply Dynamic Color to Shockwave & Glow based on the event
            if (shockwave) {
                shockwave.style.boxShadow = `0 0 80px ${accentColor}, inset 0 0 80px ${accentColor}`;
                shockwave.style.borderColor = accentColor;
            }
            const textGlow = document.querySelector('.text-glow');
            if (textGlow) textGlow.style.color = accentColor;
            
            // Double requestAnimationFrame ensures WebKit/Mobile Safari actually paints 
            // the cleared state before applying the active state, guaranteeing the animation plays every time.
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    spans.forEach(s => s.innerText = displayText);

                    // Trigger the new animation classes
                    stage.classList.add('is-active'); 
                    
                    if (eventSponsors) eventSponsors.style.opacity = '1';

                    // Cleanup after animation completes (matches the 3.5s CSS animation)
                    setTimeout(() => {
                        stage.classList.remove('is-active');
                        if (eventSponsors) eventSponsors.style.opacity = '0';
                    }, 3500);
                });
            });
        }
    </script>
</body>
