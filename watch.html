<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Match Broadcast</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #viewer-video { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            background: #000; 
            display: block; 
        }
        
        /* OVERLAYS */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; color: white; z-index: 10;
        }

        /* INPUT SCREEN */
        #input-overlay { z-index: 30; display: none; }
        #input-overlay h2 { margin-bottom: 20px; font-size: 24px; color: #fff; letter-spacing: 1px;}
        #match-input {
            padding: 15px 20px; font-size: 20px; border-radius: 8px; 
            border: 2px solid #333; background: #111; color: white; 
            margin-bottom: 20px; text-transform: uppercase; text-align: center;
            width: 80%; max-width: 300px; outline: none;
        }
        #match-input:focus { border-color: #3b82f6; }
        #submit-btn {
            padding: 15px 40px; background: #3b82f6; color: white; border: none;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transition: transform 0.1s;
        }
        #submit-btn:active { transform: scale(0.95); }

        /* STATUS SCREEN */
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-text { font-size: 16px; font-weight: bold; letter-spacing: 1px; color: #cbd5e1; }
        
        /* PLAY FALLBACK SCREEN */
        #play-overlay {
            background: rgba(0, 0, 0, 0.8); z-index: 20; display: none; cursor: pointer;
        }
        #play-btn {
            padding: 15px 40px; background: #22c55e; color: white; border: none;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body>

    <video id="viewer-video" autoplay playsinline></video>
    
    <div id="input-overlay" class="overlay">
        <h2>Enter Match ID</h2>
        <input type="text" id="match-input" placeholder="e.g. FINALS123" autocomplete="off">
        <button id="submit-btn" onclick="submitMatchId()">WATCH MATCH</button>
    </div>

    <div id="status-overlay" class="overlay">
        <div class="spinner" id="spinner"></div>
        <div id="status-text">Loading match...</div>
    </div>

    <div id="play-overlay" class="overlay" onclick="startVideo()">
        <button id="play-btn">TAP TO WATCH LIVE</button>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = { 
            apiKey: "AIzaSyBqcD59IAPpKqk98oDZkgzgkoVZ8b8LGgY", 
            authDomain: "livecricketscoring-92087.firebaseapp.com", 
            databaseURL: "https://livecricketscoring-92087-default-rtdb.firebaseio.com", 
            projectId: "livecricketscoring-92087", 
            storageBucket: "livecricketscoring-92087.firebasestorage.app", 
            messagingSenderId: "522927197627", 
            appId: "1:522927197627:web:f1df5db736cae96893089e" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const video = document.getElementById('viewer-video');
        const inputOverlay = document.getElementById('input-overlay');
        const matchInput = document.getElementById('match-input');
        const statusOverlay = document.getElementById('status-overlay');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('spinner');
        const playOverlay = document.getElementById('play-overlay');
        
        let peer = null;
        let unsubscribe = null;

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const matchId = params.get('matchId');

            if (!matchId) {
                // No Match ID in URL -> Show manual input screen
                inputOverlay.style.display = 'flex';
                statusOverlay.style.display = 'none';
            } else {
                // Match ID exists -> Load directly
                inputOverlay.style.display = 'none';
                checkLiveStatus(matchId.toUpperCase());
            }
        };

        function submitMatchId() {
            const val = matchInput.value.trim().toUpperCase();
            if (!val) {
                alert("Please enter a valid Match ID");
                return;
            }
            
            // Update URL cleanly so the user can copy/share it later
            window.history.replaceState(null, '', '?matchId=' + val);
            
            // Transition to loading
            inputOverlay.style.display = 'none';
            statusOverlay.style.display = 'flex';
            spinner.style.display = 'block';
            
            checkLiveStatus(val);
        }

        function checkLiveStatus(matchId) {
            statusText.innerText = "Finding live stream...";
            
            // Unsubscribe from previous listener if user re-enters a different ID
            if (unsubscribe) unsubscribe();

            unsubscribe = db.collection("live_matches").doc(matchId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.isStreaming && data.streamId) {
                        if (!peer) {
                            connectToStream(data.streamId);
                        }
                    } else {
                        showError("Stream is currently offline");
                        if (peer) { peer.destroy(); peer = null; }
                        video.srcObject = null;
                    }
                } else {
                    showError("Match not found or offline");
                }
            }, (error) => {
                console.error("Firestore error:", error);
                showError("Connection error");
            });
        }

        function connectToStream(targetPeerId) {
            statusText.innerText = "Connecting to broadcast...";
            spinner.style.display = 'block';
            
            peer = new Peer({
                config: {
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                }
            });

            peer.on('open', () => {
                statusText.innerText = "Fetching live feed...";
                const call = peer.call(targetPeerId, new MediaStream()); // Connects empty stream to trigger answer
                
                call.on('stream', (remoteStream) => {
                    statusOverlay.style.display = 'none';
                    video.srcObject = remoteStream;
                    
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            // Browsers block audio autoplay sometimes
                            playOverlay.style.display = 'flex';
                        });
                    }
                });
                
                call.on('close', () => showError("Stream disconnected"));
                call.on('error', () => showError("Stream connection error"));
            });

            peer.on('error', (err) => {
                console.error("Peer error:", err);
                showError("Failed to connect. Retrying...");
            });
        }

        function startVideo() {
            playOverlay.style.display = 'none';
            video.muted = false; // Allow audio if unmuted
            video.play();
        }

        function showError(msg) {
            statusOverlay.style.display = 'flex';
            spinner.style.display = 'none';
            statusText.innerText = msg;
            
            // Add a "Go Back" button dynamically to let them try another ID
            if (!document.getElementById('back-btn')) {
                const backBtn = document.createElement('button');
                backBtn.id = 'back-btn';
                backBtn.innerText = 'TRY ANOTHER ID';
                backBtn.style.cssText = "margin-top: 20px; padding: 10px 20px; background: transparent; border: 2px solid #555; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;";
                backBtn.onclick = () => {
                    window.history.replaceState(null, '', window.location.pathname);
                    statusOverlay.style.display = 'none';
                    inputOverlay.style.display = 'flex';
                    if (peer) { peer.destroy(); peer = null; }
                };
                statusOverlay.appendChild(backBtn);
            }
        }
        
        // Let user press Enter key inside the input box to submit
        matchInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                submitMatchId();
            }
        });
    </script>
</body>
</html>
